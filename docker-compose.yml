services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/cardvault-DB
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

  mongo:
    image: mongo:6
    restart: always
    # No host port mapping — Mongo is only reachable on the internal Docker network.
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
